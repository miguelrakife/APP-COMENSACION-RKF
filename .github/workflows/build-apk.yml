name: Compilar APK Compensación
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Configurar Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependencias
        run: |
          cd frontend
          npm install -g eas-cli@latest
          npm install

      - name: Compilar APK
        run: cd frontend && eas build -p android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          
