name: Compilar APK Compensación
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Instalar dependencias
        run: |
          cd frontend
          npm install -g eas-cli@latest
          npm ci

      - name: Compilar APK estable
        run: cd frontend && eas build -p android --profile preview --non-interactive --clear-cache
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Descargar APK
        id: get-apk
        run: |
          cd frontend
          sudo apt update && sudo apt install -y jq
          BUILD_URL=$(eas build:list --limit 1 --platform android --json | jq -r '.[0].artifacts.buildUrl')
          curl -f -o Compensacion.apk "$BUILD_URL"

      - name: Guardar para descargar
        uses: actions/upload-artifact@v4
        with:
          name: Compensacion-APK
          path: frontend/Compensacion.apk
          retention-days: 30
          
