name: Compilar APK Compensación
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Usar Node 24 (versión nueva, sin avisos)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependencias
        run: |
          cd frontend
          npm install -g eas-cli
          npm install

      - name: Compilar APK (comando limpio, sin cosas raras)
        run: cd frontend && eas build -p android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Descargar archivo APK
        id: get
        run: |
          cd frontend
          apt update && apt install jq -y
          URL=$(eas build:list --limit 1 --json | jq -r '.[0].artifacts.buildUrl')
          wget -O Compensacion.apk "$URL"

      - name: Guardar APK para descargar
        uses: actions/upload-artifact@v4
        with:
          name: Compensacion-APK-Instalable
          path: frontend/Compensacion.apk
          
